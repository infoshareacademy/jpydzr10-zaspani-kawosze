{% extends "base.html" %}

{% block title %}Usuń klubowicza{% endblock %}

{% block content %}
<section class="hero">
    <div class="content-card form-card">
        <p class="eyebrow">Panel administratora</p>
        <h1>Usuń klubowicza</h1>

        <p>Czy na pewno chcesz usunąć: {{ member.name }} {{ member.surname }}?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit">Tak, usuń</button>
        </form>

        <a class="secondary-link" href="{% url 'members:list' %}">Anuluj</a>
    </div>
</section>
{% endblock %}
