{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="hero">
    <div class="content-card form-card">
        <h1>{{ page_title }}</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">{{ button_label }}</button>
        </form>

        <a class="secondary-link" href="{% url 'members:list' %}">Wróć do listy</a>
    </div>
</section>
{% endblock %}
