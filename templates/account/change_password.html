{% extends "base.html" %}

{% block title %}Zmiana hasła{% endblock %}

{% block content %}
<section class="hero">
    <div class="content-card form-card account-card">
        <p class="eyebrow">Moje konto</p>
        <h1>Zmiana hasła</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Zapisz nowe hasło</button>
        </form>

        <a class="secondary-link" href="{% url 'members:account' %}">Wróć do danych konta</a>
    </div>
</section>
{% endblock %}
