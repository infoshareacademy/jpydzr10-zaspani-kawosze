{% extends "base.html" %}

{% block title %}FAQ{% endblock %}

{% block content %}
<h2>FAQ</h2>

{% if questions %}
    <ul>
        {% for question in questions %}
            <li>{{ question }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>Brak pytan FAQ do wyswietlenia.</p>
{% endif %}
{% endblock %}
